# Default configuration for ConfigurableGraspPlanner
# Waypoints are relative to the object centroid
waypoints:
  - position: [0.0, 0.0, 0.1] # Pre-grasp (10cm above)
    orientation_quat: [1.0, 0.0, 0.0, 0.0] # Top-down (xyzw)
    gripper: 0.0 # Open
  - position: [0.0, 0.0, 0.0] # Grasp (at centroid)
    orientation_quat: [1.0, 0.0, 0.0, 0.0]
    gripper: 1.0 # Closed
  - position: [0.0, 0.0, 0.1] # Post-grasp (10cm lift)
    orientation_quat: [1.0, 0.0, 0.0, 0.0]
    gripper: 1.0 # Closed
